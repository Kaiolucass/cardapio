<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Burger — Cardápio</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="hero">
  <p class="hero-eyebrow">Cardápio Digital</p>
  <h1 class="hero-title">My<br><em>Burger</em></h1>
  <div class="hero-meta">
    <span>Brasília, DF</span>
    <span class="dot"></span>
    <span class="hero-status" id="status-badge">Aberto agora</span>
    <span class="dot"></span>
    <span>Seg–Dom até 23h</span>
  </div>
</section>

<div class="nav-wrap">
  <nav class="nav">
    <div class="nav-cats" id="nav-cats">
      <button class="cat-btn active" onclick="filter('todos', this)">Todos</button>
      <button class="cat-btn" onclick="filter('Lanches', this)">Lanches</button>
      <button class="cat-btn" onclick="filter('Batatas', this)">Batatas</button>
      <button class="cat-btn" onclick="filter('Bebidas', this)">Bebidas</button>
      <button class="cat-btn" onclick="filter('Combos', this)">Combos</button>
    </div>
    <button class="cart-trigger" onclick="openCart()">
      Pedido <span class="cart-count" id="cart-count">0</span>
    </button>
  </nav>
</div>

<main class="main">
  <p class="section-label" id="section-label">Cardápio completo</p>
  <div class="row g-4" id="products-grid"></div>
</main>

<div class="overlay" id="overlay" onclick="handleOverlayClick(event)">
  <div class="cart-panel" id="cart-panel">
    <div class="cart-header">
      <h2 class="cart-title">Seu pedido</h2>
      <button class="close-btn" onclick="closeCart()">×</button>
    </div>

    <div class="cart-items" id="cart-items">
      <p class="cart-empty">Nenhum item adicionado ainda.</p>
    </div>

    <div class="cart-footer">
      <div class="delivery-section">
        <p class="delivery-label">Entrega</p>
        <div class="delivery-opts">
          <button class="delivery-opt selected" id="opt-retirada" onclick="selectDelivery('retirada')">Retirar</button>
          <button class="delivery-opt" id="opt-delivery" onclick="selectDelivery('delivery')">Delivery</button>
        </div>

        <div class="endereco-block" id="endereco-block">
          <div class="cep-row">
            <input class="cep-input" type="text" id="cep-input" placeholder="CEP" maxlength="9" oninput="maskCEP(this)" onblur="buscarCEP()">
            <button class="cep-btn" onclick="buscarCEP()">Ok</button>
          </div>

          <button class="loc-btn" id="loc-btn" onclick="usarLocalizacao()">📍 Usar minha localização</button>

          <input class="cep-input full-input" type="text" id="rua-input" placeholder="Rua e bairro (preenche sozinho, mas pode editar)">

          <div class="numero-row">
            <input class="cep-input" type="text" id="numero-input" placeholder="Número">
            <input class="cep-input" type="text" id="complemento-input" placeholder="Complemento (opcional)">
          </div>
        </div>
      </div>

      <div class="payment-section">
        <p class="delivery-label">Pagamento na entrega</p>
        <div class="delivery-opts">
          <button class="delivery-opt selected" id="opt-pix" onclick="selectPayment('pix')">Pix</button>
          <button class="delivery-opt" id="opt-credito" onclick="selectPayment('credito')">Crédito</button>
          <button class="delivery-opt" id="opt-debito" onclick="selectPayment('debito')">Débito</button>
          <button class="delivery-opt" id="opt-dinheiro" onclick="selectPayment('dinheiro')">Dinheiro</button>
        </div>
        <div class="troco-row" id="troco-row">
          <input class="cep-input" type="number" id="troco-input" placeholder="Troco para quanto?">
        </div>
      </div>

      <div class="cart-total-row">
        <span class="cart-total-label">Total</span>
        <span class="cart-total-value" id="cart-total">R$ 0,00</span>
      </div>
      <button class="whats-btn" id="whats-btn" onclick="enviarWhats()" disabled>
        Enviar via WhatsApp
      </button>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
